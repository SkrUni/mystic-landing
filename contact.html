<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оставить заявку - Crystal Clear Design</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="contact-page">
  <div class="page-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="header__container">
        <a href="index.html" class="logo">Crystal clear Design</a>
        <nav class="nav">
          <a href="index.html" class="nav__link">на главную</a>
          <a href="portfolio.html" class="nav__link">портфолио</a>
          <a href="workflow.html" class="nav__link">ход работы</a>
          <a href="pricing.html" class="nav__link">цена</a>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="main__content">
        <!-- Left Column - Title, Description and Contact Links -->
        <div class="hero-text">
          <h1 class="hero-text__title">Оставить<br>заявку</h1>
          <p class="hero-text__description">текст текст текст текст текст текст текст текст</p>
          
          <!-- Contact Links -->
          <div class="contact-links">
            <a href="#" class="contact-links__item">Telegram</a>
            <a href="#" class="contact-links__item">Behance</a>
            <a href="mailto:o.krisshtal@mail.ru" class="contact-links__item">Почта: o.krisshtal@mail.ru</a>
          </div>
        </div>

        <!-- Right Column - Form -->
        <section class="form-wrapper">
          <form class="contact-form" action="#" method="post">
            <div class="contact-form__fields">
              <input type="text" name="name" placeholder="Имя" class="contact-form__input" required>
              <input type="tel" name="phone" placeholder="Телефон" class="contact-form__input" required>
              <input type="text" name="telegram" placeholder="Telegram" class="contact-form__input">
              <input type="text" name="description" placeholder="Описание проекта" class="contact-form__input">
            </div>
            <div class="contact-form__submit">
              <button type="submit" class="btn btn--primary">Отправить форму</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__container">
        <a href="index.html" class="logo">Crystal clear Design</a>
        <div class="footer__links">
          <span class="footer__text">Политика конфиденциальности</span>
          <span class="footer__text">Концепт от</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
